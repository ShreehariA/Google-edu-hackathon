<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeltaEd — Biggest Leaps This Week</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="leaderboard.css" />
</head>

<body>

  <header class="topbar">
    <a href="index.html" class="topbar-brand">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24">
          <path d="M3 20 L12 4 L21 20 H14 L12 16 L10 20 Z" />
        </svg>
      </div>
      <span><span class="d">Delta</span>Ed</span>
    </a>
    <nav class="topbar-nav">
      <a href="leaderboard.html" class="active">Leaderboard</a>
      <a href="dashboard.html">My Progress</a>
      <a href="chat.html">AI Coach</a>
    </nav>
    <div class="topbar-right">
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode" title="Toggle dark mode">
        <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg>
        <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5" />
          <line x1="12" y1="1" x2="12" y2="3" />
          <line x1="12" y1="21" x2="12" y2="23" />
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
          <line x1="1" y1="12" x2="3" y2="12" />
          <line x1="21" y1="12" x2="23" y2="12" />
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
        </svg>
      </button>
      <div class="topbar-avatar" title="Alex Morgan">AM</div>
    </div>
  </header>

  <main class="lb-page">

    <!-- Page heading — always visible -->
    <div class="lb-header">
      <div>
        <p class="lb-eyebrow" id="lbEyebrow">Loading…</p>
        <h1>Biggest Leaps This Week</h1>
        <p class="lb-sub">Ranked by improvement in average score vs. the week before</p>
      </div>

    </div>

    <!--
      Three mutually exclusive regions — JS shows exactly one at a time:
        #lbLoading  (default, shown while fetching)
        #lbEmpty    (no eligible students)
        #lbList     (real data)
    -->

    <!-- LOADING: 5 skeleton cards -->
    <div id="lbLoading" aria-busy="true" aria-label="Loading leaderboard">
      <ol class="lb-list lb-list-skeletons">
        <li class="lb-row lb-skeleton">
          <div class="sk sk-rank"></div>
          <div class="sk sk-av"></div>
          <div class="sk-body">
            <div class="sk sk-name"></div>
            <div class="sk sk-stats"></div>
          </div>
          <div class="sk sk-delta"></div>
        </li>
        <li class="lb-row lb-skeleton">
          <div class="sk sk-rank"></div>
          <div class="sk sk-av"></div>
          <div class="sk-body">
            <div class="sk sk-name"></div>
            <div class="sk sk-stats"></div>
          </div>
          <div class="sk sk-delta"></div>
        </li>
        <li class="lb-row lb-skeleton">
          <div class="sk sk-rank"></div>
          <div class="sk sk-av"></div>
          <div class="sk-body">
            <div class="sk sk-name"></div>
            <div class="sk sk-stats"></div>
          </div>
          <div class="sk sk-delta"></div>
        </li>
        <li class="lb-row lb-skeleton">
          <div class="sk sk-rank"></div>
          <div class="sk sk-av"></div>
          <div class="sk-body">
            <div class="sk sk-name"></div>
            <div class="sk sk-stats"></div>
          </div>
          <div class="sk sk-delta"></div>
        </li>
        <li class="lb-row lb-skeleton">
          <div class="sk sk-rank"></div>
          <div class="sk sk-av"></div>
          <div class="sk-body">
            <div class="sk sk-name"></div>
            <div class="sk sk-stats"></div>
          </div>
          <div class="sk sk-delta"></div>
        </li>
      </ol>
    </div>

    <!-- EMPTY: no eligible students -->
    <div id="lbEmpty" class="lb-empty hidden" role="status">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="10" />
        <path d="M12 8v4l3 3" />
      </svg>
      <p>Not enough activity this week to generate a leaderboard.</p>
      <span>Students need at least 10 attempts in each of the past two weeks to qualify.</span>
    </div>

    <!-- DATA: real cards — populated by JS -->
    <ol class="lb-list hidden" id="lbList" aria-label="Leaderboard — top 5 biggest leaps">
      <!-- Injected by renderLeaderboard() -->
    </ol>

    <!-- Footer: last updated + your-position — populated by JS, hidden until data loads -->
    <div class="lb-footer hidden" id="lbFooter">
      <div class="your-row card" id="yourRow">
        <div class="lb-rank">99+</div>
        <div class="lb-name" id="myLbName" style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;"></div>
        <div class="lb-pts" id="myLbPts">0 Pts</div>
      </div>
      <p class="lb-updated" id="lbUpdated"></p>
    </div>

  </main>

  <div class="toast" id="toast"><span id="toastMsg"></span></div>
  <script src="config.js?v=4"></script>
  <script src="script.js?v=4"></script>
</body>

</html>
